<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - VinaRoute</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="container navbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">VR</span>
      <span>VinaRoute</span>
    </a>
  </div>
</header>
<main>
  <section class="section" style="padding-top: 4rem; padding-bottom: 4rem;">
    <div class="container">
      <div class="panel" style="max-width: 560px; margin: 0 auto;">
        <h2>Đăng nhập tài khoản</h2>
        <p class="text-muted">Truy cập dashboard để quản lý booking, lịch sử và đặt vé nhanh chóng.</p>
        <form id="loginForm" method="POST" action="/login">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="email" type="email" placeholder="email@domain.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Mật khẩu</label>
            <input id="loginPassword" name="password" type="password" placeholder="••••••••" required>
          </div>
          <button class="btn btn-primary w-full" type="submit">Đăng nhập</button>
          <p class="text-muted" style="margin-top:1rem; text-align:center;">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
        </form>
      </div>
    </div>
  </section>
</main>
<script src="js/auth.js"></script>
</body>
</html>
