<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Tam Long Limo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="container navbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">VR</span>
      <span>Tam Long Limo</span>
    </a>
  </div>
</header>
<main>
  <section class="section" style="padding-top: 4rem; padding-bottom: 4rem;">
    <div class="container">
      <div class="panel" style="max-width: 640px; margin: 0 auto;">
        <h2>Đăng ký tài khoản</h2>
        <p class="text-muted">Tạo tài khoản để dùng chức năng đặt vé, quản lý lịch trình và nhận ưu đãi.</p>
        <form id="registerForm" method="POST" action="/register">
          <div class="grid-3">
            <div class="form-group">
              <label for="regName">Họ và tên</label>
              <input id="regName" name="name" type="text" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
              <label for="regEmail">Email</label>
              <input id="regEmail" name="email" type="email" placeholder="email@domain.com" required>
            </div>
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label for="regPassword">Mật khẩu</label>
              <input id="regPassword" name="password" type="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
              <label for="regConfirmPassword">Xác nhận mật khẩu</label>
              <input id="regConfirmPassword" name="password_confirmation" type="password" placeholder="••••••••" required>
            </div>
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label for="regPhone">Số điện thoại</label>
              <input id="regPhone" name="phone" type="text" placeholder="+84 908 1122 33">
            </div>
            <div class="form-group">
              <label for="regRole">Vai trò</label>
              <select id="regRole" name="role">
                <option value="customer">Khách hàng</option>
                <option value="operator">Nhà xe</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary w-full" type="submit">Đăng ký</button>
          <p class="text-muted" style="margin-top:1rem; text-align:center;">Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
        </form>
      </div>
    </div>
  </section>
</main>
<script src="js/auth.js"></script>
</body>
</html>
